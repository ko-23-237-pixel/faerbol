<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Личные сообщения</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #0066ff;
      --primary-dark: #0055cc;
      --bg: #f0f2f5;
      --card: white;
      --text: #1c1e21;
      --text-secondary: #65676b;
      --border: #dddfe2;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 16px;
      color: var(--text);
    }
    .container { max-width: 720px; margin: 0 auto; }
    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .auth-section { padding: 20px; text-align: center; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger { background: #e63946; color: white; }
    .btn-danger:hover { background: #d00000; }
    h2 { margin: 0 0 16px; font-size: 1.35rem; padding: 0 16px; }
    .users-list .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .users-list .user-item:hover,
    .users-list .user-item.active {
      background: #e7f3ff;
    }
    .chat-section { display: none; }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #f8f9fa;
    }
    .messages {
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fafafa;
    }
    .message {
      display: flex;
      max-width: 80%;
      gap: 8px;
    }
    .message.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-content {
      padding: 10px 14px;
      border-radius: 18px;
      background: #e1e8ed;
      word-break: break-word;
    }
    .message.sent .message-content {
      background: var(--primary);
      color: white;
    }
    .message img, .message video {
      max-width: 240px;
      border-radius: 12px;
      margin-top: 6px;
      display: block;
    }
    .message-file a {
      color: #0066ff;
      text-decoration: underline;
      font-size: 0.95rem;
    }
    .message-time {
      font-size: 0.75rem;
      opacity: 0.8;
      margin-top: 4px;
      text-align: right;
    }
    .chat-input {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .chat-input input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 15px;
      min-width: 0;
    }
    .file-attach-label {
      cursor: pointer;
      padding: 10px;
      color: #666;
      font-size: 1.4rem;
    }
    .file-attach-label:hover { color: var(--primary); }
    .attached-file-name {
      font-size: 0.85rem;
      color: #555;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Авторизация -->
  <div class="card auth-section">
    <div id="loginBlock">
      <button id="loginBtn" class="btn btn-primary">
        <i class="fab fa-google"></i> Войти через Google
      </button>
    </div>
    <div id="userBlock" style="display:none;">
      <div class="user-info">
        <img id="userPhoto" class="avatar" src="" alt="">
        <span id="userName"></span>
      </div>
      <button id="logoutBtn" class="btn btn-danger">Выйти</button>
    </div>
  </div>

  <!-- Список пользователей + "Заметки себе" -->
  <div class="card">
    <h2><i class="fas fa-users"></i> С кем пообщаться?</h2>
    <div id="usersList" class="users-list">
      <!-- Сам себе -->
      <div id="selfChatItem" class="user-item" style="display:none;">
        <img id="selfAvatar" class="avatar" src="" alt="">
        <div style="flex:1">
          <div style="font-weight:600">Заметки / себе</div>
          <div style="font-size:0.85rem; color:var(--text-secondary)">Личный чат</div>
        </div>
        <button class="btn btn-primary start-chat">Открыть</button>
      </div>

      <div id="usersLoading" style="padding:20px; text-align:center; color:#777;">
        Загрузка пользователей...
      </div>
    </div>
  </div>

  <!-- Окно чата -->
  <div class="card chat-section" id="chatSection">
    <div class="chat-header">
      <img id="currentChatAvatar" class="avatar" src="" alt="">
      <div style="flex:1">
        <strong id="currentChatName"></strong>
      </div>
      <button id="closeChatBtn" class="btn" style="background:#6c757d; color:white;">✕</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Напишите сообщение..."/>
      <label for="fileAttach" class="file-attach-label" title="Прикрепить фото, видео или файл">
        <i class="fas fa-paperclip"></i>
      </label>
      <input type="file" id="fileAttach" style="display:none;" accept="image/*,video/*,.pdf"/>
      <span id="attachedFileName" class="attached-file-name" style="display:none;"></span>
      <button id="sendBtn" class="btn btn-primary">Отправить</button>
    </div>
  </div>

  <div id="errorContainer" class="error-message" style="display:none;"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import {
    getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc,
    serverTimestamp, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
  import {
    getStorage, ref, uploadBytes, getDownloadURL
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBTYxqJJwlH82dnQdIr85j4z-CECBK4xJQ",
    authDomain: "named-vine-444211-p3.firebaseapp.com",
    projectId: "named-vine-444211-p3",
    storageBucket: "named-vine-444211-p3.firebasestorage.app",
    messagingSenderId: "120244119099",
    appId: "1:120244119099:web:114c26adfaeb8492325e1e",
    measurementId: "G-VQ5YQPQB36"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const provider = new GoogleAuthProvider();

  const els = {
    loginBtn: document.getElementById('loginBtn'),
    logoutBtn: document.getElementById('logoutBtn'),
    loginBlock: document.getElementById('loginBlock'),
    userBlock: document.getElementById('userBlock'),
    userPhoto: document.getElementById('userPhoto'),
    userName: document.getElementById('userName'),
    usersList: document.getElementById('usersList'),
    chatSection: document.getElementById('chatSection'),
    messages: document.getElementById('messages'),
    messageInput: document.getElementById('messageInput'),
    fileAttach: document.getElementById('fileAttach'),
    attachedFileName: document.getElementById('attachedFileName'),
    sendBtn: document.getElementById('sendBtn'),
    currentChatAvatar: document.getElementById('currentChatAvatar'),
    currentChatName: document.getElementById('currentChatName'),
    closeChatBtn: document.getElementById('closeChatBtn'),
    errorContainer: document.getElementById('errorContainer')
  };

  let currentUser = null;
  let currentChatUser = null;
  let unsubscribeUsers = null;
  let unsubscribeChat = null;

  function showError(msg, ms = 5000) {
    els.errorContainer.textContent = msg;
    els.errorContainer.style.display = 'block';
    setTimeout(() => els.errorContainer.style.display = 'none', ms);
  }

  els.loginBtn.onclick = async () => {
    try {
      els.loginBtn.disabled = true;
      await signInWithPopup(auth, provider);
    } catch (err) {
      showError(err.code === "auth/popup-blocked" ? "Всплывающее окно заблокировано" : "Ошибка входа");
    } finally {
      els.loginBtn.disabled = false;
    }
  };

  els.logoutBtn.onclick = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      els.loginBlock.style.display = 'none';
      els.userBlock.style.display = 'block';
      els.userPhoto.src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'You')}&background=0066ff&color=fff`;
      els.userName.textContent = user.displayName || 'Пользователь';

      // Показываем "Заметки себе"
      const selfItem = document.getElementById('selfChatItem');
      const selfAvatar = document.getElementById('selfAvatar');
      selfAvatar.src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'You')}&background=2ecc71&color=fff`;
      selfItem.style.display = 'flex';

      selfItem.querySelector('.start-chat').onclick = e => {
        e.stopPropagation();
        startChat({
          uid: user.uid,
          displayName: user.displayName || 'Вы (заметки)',
          photoURL: user.photoURL
        });
      };

      loadUsers();
    } else {
      els.loginBlock.style.display = 'block';
      els.userBlock.style.display = 'none';
      els.chatSection.style.display = 'none';
      document.getElementById('selfChatItem').style.display = 'none';
      els.usersList.innerHTML = '<div style="padding:30px; text-align:center; color:#777;">Войдите, чтобы увидеть пользователей</div>';
      if (unsubscribeUsers) unsubscribeUsers();
      if (unsubscribeChat) unsubscribeChat();
    }
  });

  function loadUsers() {
    unsubscribeUsers = onSnapshot(collection(db, "users"), snap => {
      if (!currentUser) return;

      document.getElementById('usersLoading').style.display = 'none';

      let hasOthers = false;
      snap.forEach(d => {
        const u = d.data();
        if (u.uid === currentUser.uid) return;
        hasOthers = true;

        const item = document.createElement('div');
        item.className = 'user-item';
        if (currentChatUser?.uid === u.uid) item.classList.add('active');

        item.innerHTML = `
          <img class="avatar" src="${u.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.displayName || 'User')}&background=4a90e2&color=fff`}" alt="">
          <div style="flex:1">
            <div style="font-weight:600">${u.displayName || 'Пользователь'}</div>
          </div>
          <button class="btn btn-primary start-chat">Написать</button>
        `;

        item.querySelector('.start-chat').onclick = e => {
          e.stopPropagation();
          startChat(u);
        };

        els.usersList.appendChild(item);
      });

      if (!hasOthers) {
        const noOthers = document.createElement('div');
        noOthers.style.cssText = 'padding:20px; text-align:center; color:#777;';
        noOthers.textContent = 'Других пользователей пока нет';
        els.usersList.appendChild(noOthers);
      }
    }, err => {
      console.error(err);
      showError("Ошибка загрузки пользователей");
      document.getElementById('usersLoading').innerHTML = '<div style="color:red;">Ошибка загрузки</div>';
    });
  }

  async function ensureChatExists(chatId) {
    const chatRef = doc(db, "chats", chatId);
    if (!(await getDoc(chatRef)).exists()) {
      await setDoc(chatRef, {
        participants: [currentUser.uid, currentChatUser.uid].sort(),
        createdAt: serverTimestamp(),
        lastMessage: null,
        lastMessageTime: serverTimestamp(),
        lastSender: null
      });
    }
  }

  function startChat(user) {
    if (currentChatUser?.uid === user.uid) return;
    currentChatUser = user;

    els.chatSection.style.display = 'block';

    // Специальный вид для чата с самим собой
    if (user.uid === currentUser.uid) {
      els.currentChatName.textContent = "Заметки / личный чат";
      els.currentChatAvatar.src = currentUser.photoURL || `https://ui-avatars.com/api/?name=Notes&background=2ecc71&color=fff`;
    } else {
      els.currentChatName.textContent = user.displayName || 'Пользователь';
      els.currentChatAvatar.src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}&background=4a90e2&color=fff`;
    }

    const chatId = [currentUser.uid, user.uid].sort().join('_');

    if (unsubscribeChat) {
      unsubscribeChat();
      unsubscribeChat = null;
    }

    els.messages.innerHTML = '<div style="padding:40px; text-align:center; color:#777;">Загрузка сообщений...</div>';

    ensureChatExists(chatId).then(() => {
      const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp"));
      unsubscribeChat = onSnapshot(q, snap => {
        if (snap.empty) {
          els.messages.innerHTML = '<div style="padding:40px; text-align:center; color:#777;">Нет сообщений. Напишите первое!</div>';
          return;
        }
        els.messages.innerHTML = '';
        snap.forEach(docSnap => {
          const m = docSnap.data();
          const isSent = m.senderId === currentUser.uid;
          const div = document.createElement('div');
          div.className = `message ${isSent ? 'sent' : ''}`;

          let content = `<div class="message-content">`;
          if (m.text) content += m.text;
          if (m.fileUrl) {
            if (m.type === 'image') content += `<img src="${m.fileUrl}" alt="Фото" loading="lazy">`;
            else if (m.type === 'video') content += `<video src="${m.fileUrl}" controls preload="metadata"></video>`;
            else content += `<div class="message-file"><a href="${m.fileUrl}" target="_blank" download><i class="fas fa-file"></i> ${m.fileName || 'Файл'}</a></div>`;
          }
          content += `<div class="message-time">${m.timestamp ? m.timestamp.toDate().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : ''}${isSent ? ' ✓' : ''}</div></div>`;

          div.innerHTML = `
            <img class="avatar" src="${isSent ? (currentUser.photoURL || `https://ui-avatars.com/api/?name=You`) : (m.senderPhotoURL || user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}`)}" alt="">
            ${content}
          `;
          els.messages.appendChild(div);
        });
        els.messages.scrollTop = els.messages.scrollHeight;
      }, err => {
        console.error(err);
        showError(err.code === 'permission-denied' ? "Нет доступа к чату" : "Ошибка загрузки сообщений");
      });
    }).catch(err => {
      console.error(err);
      showError("Не удалось открыть чат");
    });
  }

  els.sendBtn.onclick = async () => {
    if (!currentUser || !currentChatUser) return showError("Выберите собеседника");

    const text = els.messageInput.value.trim();
    const file = els.fileAttach.files[0];

    if (!text && !file) return showError("Напишите сообщение или прикрепите файл");

    const chatId = [currentUser.uid, currentChatUser.uid].sort().join('_');
    await ensureChatExists(chatId);

    els.sendBtn.disabled = true;
    els.sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    try {
      let fileUrl = null, fileName = null, type = 'text';

      if (file) {
        if (file.size > 10*1024*1024) throw new Error("Файл > 10 МБ");
        fileName = file.name;
        const path = `chats/${chatId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
        const fileRef = ref(storage, path);
        await uploadBytes(fileRef, file);
        fileUrl = await getDownloadURL(fileRef);
        if (file.type.startsWith('image/')) type = 'image';
        else if (file.type.startsWith('video/')) type = 'video';
      }

      const msgData = {
        text: text || (file ? `Прикреплён: ${fileName}` : ''),
        senderId: currentUser.uid,
        senderName: currentUser.displayName || 'Пользователь',
        senderPhotoURL: currentUser.photoURL || '',
        timestamp: serverTimestamp(),
        type,
        fileUrl,
        fileName
      };

      await addDoc(collection(db, "chats", chatId, "messages"), msgData);

      await updateDoc(doc(db, "chats", chatId), {
        lastMessage: text || `Файл: ${fileName || 'прикреплён'}`,
        lastMessageTime: serverTimestamp(),
        lastSender: currentUser.uid
      });

      els.messageInput.value = '';
      els.fileAttach.value = '';
      els.attachedFileName.style.display = 'none';
    } catch (err) {
      console.error(err);
      showError(err.message.includes("10 МБ") ? err.message : "Не удалось отправить");
    } finally {
      els.sendBtn.disabled = false;
      els.sendBtn.textContent = "Отправить";
    }
  };

  els.fileAttach.onchange = () => {
    const f = els.fileAttach.files[0];
    els.attachedFileName.textContent = f ? f.name : '';
    els.attachedFileName.style.display = f ? 'inline' : 'none';
  };

  els.messageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      els.sendBtn.click();
    }
  });

  els.closeChatBtn.onclick = () => {
    currentChatUser = null;
    els.chatSection.style.display = 'none';
    if (unsubscribeChat) {
      unsubscribeChat();
      unsubscribeChat = null;
    }
    els.messages.innerHTML = '';
  };
</script>
</body>
</html>
