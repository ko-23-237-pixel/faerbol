<!-- ... верхняя часть HTML остаётся той же ... -->

<!-- Внутри блока чата заменить .chat-input на это: -->
<div class="chat-input">
    <input type="text" id="messageInput" placeholder="Напишите сообщение...">
    
    <!-- Скрепка для прикрепления файла -->
    <label for="fileAttach" class="file-attach-label" title="Прикрепить файл">
        <i class="fas fa-paperclip"></i>
    </label>
    <input type="file" id="fileAttach" style="display:none;" accept="*/*">
    
    <div id="attachedFileName" class="attached-file-name" style="display:none; font-size:0.85rem; color:#555; margin-left:8px;"></div>
    
    <button id="sendBtn" class="btn btn-primary">Отправить</button>
</div>

<!-- Добавь в <style> эти правила -->
<style>
    .file-attach-label {
        cursor: pointer;
        padding: 10px;
        color: #666;
        font-size: 1.3rem;
        display: flex;
        align-items: center;
    }
    .file-attach-label:hover { color: var(--primary); }
    .attached-file-name {
        max-width: 180px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .message img {
        max-width: 220px;
        border-radius: 12px;
        margin-top: 6px;
        display: block;
    }
    .message-file-link {
        color: #0066ff;
        text-decoration: underline;
        font-size: 0.95rem;
        margin-top: 4px;
        display: inline-block;
    }
    .message-file-link:hover { text-decoration: none; }
</style>

<script type="module">
    // ... все предыдущие импорты остаются ...

    // Добавляем импорт Storage
    import { 
        getStorage, 
        ref, 
        uploadBytes, 
        getDownloadURL 
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

    // Инициализация Storage (добавь после const db = getFirestore(app);
    const storage = getStorage(app);

    // ... остальной код до функции startChat ...

    // Внутри startChat, в блоке onSnapshot обработки сообщений — заменить создание div сообщения:

    // Внутри snap.forEach(docSnap => { ... })
    const m = docSnap.data();
    const sent = m.senderId === currentUser.uid;

    const div = document.createElement('div');
    div.className = `message ${sent ? 'sent' : ''}`;

    let contentHTML = `<div class="message-content">${m.text || ''}`;

    if (m.fileUrl) {
        if (m.type === 'image') {
            contentHTML += `<img src="${m.fileUrl}" alt="Прикреплённое изображение">`;
        } else {
            contentHTML += `<a href="${m.fileUrl}" target="_blank" class="message-file-link">
                📎 Скачать ${m.fileName || 'файл'}
            </a>`;
        }
    }

    contentHTML += `
        <div class="message-time">
            ${m.timestamp ? m.timestamp.toDate().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : ''}
        </div>
    </div>`;

    div.innerHTML = `
        <img class="avatar" src="${sent ? currentUser.photoURL : (m.senderPhotoURL || currentChatUser.photoURL)}" alt="">
        ${contentHTML}
    `;

    els.messages.appendChild(div);

    // ... scrollTop ...

    // Новая логика отправки сообщения (заменить полностью els.sendBtn.onclick)

    els.sendBtn.onclick = async () => {
        const text = els.messageInput.value.trim();
        const file = els.fileAttach.files[0];

        if (!text && !file) return showError('Напишите сообщение или прикрепите файл');

        if (!currentUser || !currentChatUser) return showError('Выберите собеседника');

        const chatId = [currentUser.uid, currentChatUser.uid].sort().join('_');

        els.sendBtn.disabled = true;
        els.sendBtn.textContent = "Отправка...";

        try {
            let fileUrl = null;
            let fileName = null;
            let messageType = text ? 'text' : 'file';

            if (file) {
                fileName = file.name;
                const storagePath = `chat-files/${chatId}/${Date.now()}_${file.name}`;
                const storageRef = ref(storage, storagePath);

                await uploadBytes(storageRef, file);
                fileUrl = await getDownloadURL(storageRef);

                // Определяем тип для отображения
                if (file.type.startsWith('image/')) {
                    messageType = 'image';
                }
            }

            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: text || (file ? `Прикреплён файл: ${fileName}` : ''),
                senderId: currentUser.uid,
                senderName: currentUser.displayName,
                senderPhotoURL: currentUser.photoURL,
                timestamp: serverTimestamp(),
                fileUrl,
                fileName,
                type: messageType
            });

            // Очистка
            els.messageInput.value = '';
            els.fileAttach.value = '';
            els.attachedFileName.style.display = 'none';
            els.attachedFileName.textContent = '';

        } catch (err) {
            console.error(err);
            showError('Не удалось отправить: ' + err.message);
        } finally {
            els.sendBtn.disabled = false;
            els.sendBtn.textContent = "Отправить";
        }
    };

    // Показываем имя прикреплённого файла
    els.fileAttach.onchange = () => {
        const file = els.fileAttach.files[0];
        if (file) {
            els.attachedFileName.textContent = file.name;
            els.attachedFileName.style.display = 'block';
        } else {
            els.attachedFileName.style.display = 'none';
        }
    };

    // Отправка по Enter (без Shift — текст, с Shift+Enter — новая строка)
    els.messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            els.sendBtn.click();
        }
    });

    // ... остальной код (closeChat, loadPosts и т.д.) остаётся без изменений ...
</script>
