<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат и лента</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #0066ff;
            --primary-dark: #0055dd;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1c1e21;
            --text-secondary: #65676b;
            --border: #dddfe2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .container { max-width: 720px; margin: 0 auto; padding: 16px; }

        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .auth-section {
            padding: 24px;
            text-align: center;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-dark); }

        .btn-danger {
            background: #e63946;
            color: white;
        }

        .btn-danger:hover { background: #d00000; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 16px;
            color: var(--text);
        }

        .users-list .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .users-list .user-item:hover,
        .users-list .user-item.active {
            background: #e7f3ff;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: #f8f9fa;
        }

        .messages {
            min-height: 320px;
            max-height: 420px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }

        .message {
            display: flex;
            max-width: 80%;
            gap: 8px;
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 18px;
            background: #e1e8ed;
            word-break: break-word;
        }

        .message.sent .message-content {
            background: var(--primary);
            color: white;
        }

        .message-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
            align-self: flex-end;
        }

        .chat-input {
            display: flex;
            padding: 12px 16px;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 15px;
        }

        .post-form {
            display: flex;
            gap: 8px;
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .post-form input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        .post {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .post:last-child { border-bottom: none; }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 16px;
            text-align: center;
        }

        .loading { text-align: center; color: var(--text-secondary); padding: 20px; }
    </style>
</head>
<body>

<div class="container">

    <!-- Авторизация -->
    <div class="card auth-section">
        <div id="loginBlock">
            <button id="loginBtn" class="btn btn-primary">
                <i class="fab fa-google"></i> Войти через Google
            </button>
        </div>
        <div id="userBlock" style="display: none;">
            <div class="user-info">
                <img id="userPhoto" class="avatar" src="" alt="Аватар">
                <span id="userName" style="font-weight: 600; font-size: 1.1rem;"></span>
                <button id="logoutBtn" class="btn btn-danger">Выйти</button>
            </div>
        </div>
    </div>

    <!-- Список пользователей -->
    <div class="card">
        <div style="padding: 16px;">
            <h2><i class="fas fa-users"></i> С кем пообщаться?</h2>
        </div>
        <div id="usersList" class="users-list">
            <div class="loading">Загрузка пользователей...</div>
        </div>
    </div>

    <!-- Чат -->
    <div class="card chat-section" id="chatSection" style="display: none;">
        <div class="chat-header">
            <img id="currentChatAvatar" class="avatar" src="" alt="">
            <div style="flex:1">
                <div id="currentChatName" style="font-weight: 600;"></div>
            </div>
            <button id="closeChatBtn" class="btn btn-outline">✕</button>
        </div>

        <div class="messages" id="messages"></div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Напишите сообщение...">
            <button id="sendBtn" class="btn btn-primary">Отправить</button>
        </div>
    </div>

    <!-- Лента -->
    <div class="card">
        <div style="padding: 16px;">
            <h2><i class="fas fa-stream"></i> Общая лента</h2>
        </div>
        <div class="post-form">
            <input type="text" id="postInput" placeholder="Что у вас нового?">
            <button id="createPostBtn" class="btn btn-primary">Опубликовать</button>
        </div>
        <div id="postsList">
            <div class="loading">Загрузка постов...</div>
        </div>
    </div>

    <div id="errorContainer" class="error-message" style="display:none;"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
    // ────────────────────────────────────────────────
    //  Исправленный firebaseConfig (прямоугольные кавычки!)
    // ────────────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyBTYxqJJwlH82dnQdIr85j4z-CECBK4xJQ",
        authDomain: "named-vine-444211-p3.firebaseapp.com",
        projectId: "named-vine-444211-p3",
        storageBucket: "named-vine-444211-p3.firebasestorage.app",
        messagingSenderId: "120244119099",
        appId: "1:120244119099:web:114c26adfaeb8492325e1e",
        measurementId: "G-VQ5YQPQB36"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ────────────────────────────────────────────────
    //  DOM
    // ────────────────────────────────────────────────
    const els = {
        loginBtn: document.getElementById('loginBtn'),
        logoutBtn: document.getElementById('logoutBtn'),
        loginBlock: document.getElementById('loginBlock'),
        userBlock: document.getElementById('userBlock'),
        userPhoto: document.getElementById('userPhoto'),
        userName: document.getElementById('userName'),
        usersList: document.getElementById('usersList'),
        chatSection: document.getElementById('chatSection'),
        messages: document.getElementById('messages'),
        messageInput: document.getElementById('messageInput'),
        sendBtn: document.getElementById('sendBtn'),
        currentChatAvatar: document.getElementById('currentChatAvatar'),
        currentChatName: document.getElementById('currentChatName'),
        closeChatBtn: document.getElementById('closeChatBtn'),
        postInput: document.getElementById('postInput'),
        createPostBtn: document.getElementById('createPostBtn'),
        postsList: document.getElementById('postsList'),
        errorContainer: document.getElementById('errorContainer')
    };

    let currentUser = null;
    let currentChatUser = null;
    let unsub = { users: null, chat: null, posts: null };

    function showError(msg, duration = 6000) {
        els.errorContainer.textContent = msg;
        els.errorContainer.style.display = 'block';
        setTimeout(() => els.errorContainer.style.display = 'none', duration);
    }

    async function saveUser(user) {
        if (!user) return;
        try {
            await db.collection('users').doc(user.uid).set({
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || 'Гость',
                photoURL: user.photoURL || 'https://via.placeholder.com/80',
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch (err) {
            console.error('saveUser error:', err);
        }
    }

    // ─── Вход ────────────────────────────────────────
    els.loginBtn.onclick = async () => {
        try {
            els.loginBtn.disabled = true;
            els.loginBtn.textContent = "Входим...";
            const result = await auth.signInWithPopup(provider);
            await saveUser(result.user);
        } catch (err) {
            console.error('SignIn error:', err);
            let msg = 'Ошибка входа';
            if (err.code === 'auth/popup-blocked') {
                msg = 'Всплывающее окно заблокировано браузером. Разрешите попапы для этого сайта.';
            } else if (err.code === 'auth/unauthorized-domain') {
                msg = 'Домен не авторизован в Firebase. Добавьте localhost и ваш домен в Authorized domains.';
            } else {
                msg += ': ' + err.message;
            }
            showError(msg);
        } finally {
            els.loginBtn.disabled = false;
            els.loginBtn.textContent = "Войти через Google";
        }
    };

    els.logoutBtn.onclick = () => auth.signOut().catch(err => showError('Ошибка выхода: ' + err.message));

    // ─── Состояние авторизации ──────────────────────
    auth.onAuthStateChanged(user => {
        currentUser = user;

        if (user) {
            els.loginBlock.style.display = 'none';
            els.userBlock.style.display = 'block';
            els.userPhoto.src = user.photoURL || 'https://via.placeholder.com/48';
            els.userName.textContent = user.displayName || 'Пользователь';

            saveUser(user);
            loadUsers();
            loadPosts();
        } else {
            els.loginBlock.style.display = 'block';
            els.userBlock.style.display = 'none';

            els.usersList.innerHTML = '<div class="loading">Войдите, чтобы увидеть пользователей</div>';
            els.postsList.innerHTML = '<div class="loading">Войдите, чтобы увидеть ленту</div>';
            els.chatSection.style.display = 'none';

            Object.values(unsub).forEach(fn => fn && fn());
            unsub = { users: null, chat: null, posts: null };
        }
    });

    // ─── Остальной код (users, chat, posts) ─────────
    // (оставлен почти без изменений, только мелкие улучшения читаемости)

    function loadUsers() {
        if (unsub.users) unsub.users();
        unsub.users = db.collection('users')
            .onSnapshot(snap => {
                if (!currentUser) return;
                const users = [];
                snap.forEach(doc => {
                    const u = doc.data();
                    if (u.uid !== currentUser.uid) users.push(u);
                });

                els.usersList.innerHTML = users.length === 0
                    ? '<div class="loading">Пока никого нет</div>'
                    : '';

                users.forEach(u => {
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    if (currentChatUser?.uid === u.uid) item.classList.add('active');

                    item.innerHTML = `
                        <img class="avatar" src="${u.photoURL || 'https://via.placeholder.com/50'}" alt="">
                        <div style="flex:1">
                            <div style="font-weight:600">${u.displayName || 'Пользователь'}</div>
                            <div style="font-size:0.85rem; color:var(--text-secondary)">${u.email || ''}</div>
                        </div>
                        <button class="btn btn-primary start-chat">Написать</button>
                    `;

                    item.querySelector('.start-chat').onclick = e => {
                        e.stopPropagation();
                        startChat(u);
                    };

                    els.usersList.appendChild(item);
                });
            }, err => {
                console.error(err);
                els.usersList.innerHTML = '<div class="loading">Ошибка загрузки</div>';
            });
    }

    function startChat(user) {
        if (currentChatUser?.uid === user.uid) return;
        currentChatUser = user;

        els.chatSection.style.display = 'block';
        els.currentChatAvatar.src = user.photoURL || 'https://via.placeholder.com/48';
        els.currentChatName.textContent = user.displayName || 'Пользователь';

        const chatId = [currentUser.uid, user.uid].sort().join('_');

        if (unsub.chat) unsub.chat();
        els.messages.innerHTML = '<div class="loading">Загрузка сообщений...</div>';

        unsub.chat = db.collection('chats').doc(chatId).collection('messages')
            .orderBy('timestamp')
            .onSnapshot(snap => {
                if (snap.empty) {
                    els.messages.innerHTML = '<div class="loading">Нет сообщений</div>';
                    return;
                }
                els.messages.innerHTML = '';
                snap.forEach(doc => {
                    const m = doc.data();
                    const sent = m.senderId === currentUser.uid;

                    const div = document.createElement('div');
                    div.className = `message ${sent ? 'sent' : ''}`;
                    div.innerHTML = `
                        <img class="avatar" src="${sent ? currentUser.photoURL : (m.senderPhotoURL || user.photoURL)}" alt="">
                        <div class="message-content">
                            ${m.text}
                            <div class="message-time">
                                ${m.timestamp ? m.timestamp.toDate().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : ''}
                            </div>
                        </div>
                    `;
                    els.messages.appendChild(div);
                });
                els.messages.scrollTop = els.messages.scrollHeight;
            });
    }

    els.sendBtn.onclick = async () => {
        const text = els.messageInput.value.trim();
        if (!text || !currentUser || !currentChatUser) return showError('Напишите сообщение');

        const chatId = [currentUser.uid, currentChatUser.uid].sort().join('_');

        try {
            await db.collection('chats').doc(chatId).collection('messages').add({
                text,
                senderId: currentUser.uid,
                senderName: currentUser.displayName,
                senderPhotoURL: currentUser.photoURL,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            els.messageInput.value = '';
        } catch (err) {
            showError('Ошибка отправки: ' + err.message);
        }
    };

    els.messageInput.onkeypress = e => { if (e.key === 'Enter') els.sendBtn.click(); };

    els.closeChatBtn.onclick = () => {
        currentChatUser = null;
        els.chatSection.style.display = 'none';
        if (unsub.chat) unsub.chat();
        unsub.chat = null;
    };

    els.createPostBtn.onclick = async () => {
        const text = els.postInput.value.trim();
        if (!text || !currentUser) return showError('Напишите текст поста');

        try {
            await db.collection('requests').add({
                name: currentUser.displayName,
                email: currentUser.email,
                photo: currentUser.photoURL,
                text,
                userId: currentUser.uid,
                likes: 0,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            els.postInput.value = '';
        } catch (err) {
            showError('Ошибка публикации: ' + err.message);
        }
    };

    function loadPosts() {
        if (unsub.posts) unsub.posts();
        unsub.posts = db.collection('requests')
            .orderBy('timestamp', 'desc')
            .onSnapshot(snap => {
                els.postsList.innerHTML = snap.empty ? '<div class="loading">Пока нет постов</div>' : '';

                snap.forEach(doc => {
                    const p = doc.data();
                    const div = document.createElement('div');
                    div.className = 'post';
                    div.innerHTML = `
                        <div style="display:flex; gap:12px; margin-bottom:8px;">
                            <img class="avatar" src="${p.photo || 'https://via.placeholder.com/48'}" alt="">
                            <div>
                                <strong>${p.name || 'Аноним'}</strong><br>
                                <small style="color:var(--text-secondary);">
                                    ${p.timestamp ? p.timestamp.toDate().toLocaleString('ru-RU',{dateStyle:'short', timeStyle:'short'}) : ''}
                                </small>
                            </div>
                        </div>
                        <div style="margin:8px 0;">${p.text}</div>
                        <button class="btn btn-outline like-btn" data-id="${doc.id}" data-likes="${p.likes||0}">
                            <i class="fas fa-heart"></i> ${p.likes || 0}
                        </button>
                    `;
                    els.postsList.appendChild(div);
                });

                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.onclick = async () => {
                        if (!currentUser) return showError('Войдите, чтобы ставить лайки');
                        const id = btn.dataset.id;
                        const likes = Number(btn.dataset.likes) || 0;
                        try {
                            await db.collection('requests').doc(id).update({ likes: likes + 1 });
                        } catch (err) {
                            showError('Ошибка лайка');
                        }
                    };
                });
            }, err => {
                console.error(err);
                els.postsList.innerHTML = '<div class="loading">Ошибка загрузки ленты</div>';
            });
    }
</script>
</body>
</html>
